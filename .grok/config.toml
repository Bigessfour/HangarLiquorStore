# Project-scoped MCP servers for Hanger Liquor Store.

[mcp_servers.terraform]
command = "C:\\Program Files\\Docker\\Docker\\resources\\bin\\docker.exe"
args = [
  "run", "-i", "--rm",
  "-e", "TFE_ADDRESS=${TFE_ADDRESS}",
  "-e", "TFE_TOKEN=${TFE_TOKEN}",
  "hashicorp/terraform-mcp-server:1.0.0",
]
startup_timeout_sec = 60

[mcp_servers.playwright-mcp]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--config", "playwright-mcp.config.json"]
startup_timeout_sec = 60
[mcp_servers.playwright-mcp.env]
PATH = "C:\\Program Files\\nodejs;${PATH}"
PLAYWRIGHT_BROWSERS_PATH = ".playwright-browsers"

[mcp_servers.playwright-test]
command = "npx"
args = ["-y", "playwright", "run-test-mcp-server"]
startup_timeout_sec = 60
[mcp_servers.playwright-test.env]
PATH = "C:\\Program Files\\nodejs;${PATH}"
PLAYWRIGHT_BROWSERS_PATH = ".playwright-browsers"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]
startup_timeout_sec = 60
[mcp_servers.chrome-devtools.env]
PATH = "C:\\Program Files\\nodejs;${PATH}"