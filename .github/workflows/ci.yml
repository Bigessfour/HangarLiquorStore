name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # E2e + CI builds use in-memory mocks — never production API from synced .env
  VITE_DEMO_AUTH: 'true'
  VITE_API_URL: ''
  VITE_COGNITO_USER_POOL_ID: ''
  VITE_COGNITO_CLIENT_ID: ''

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  backend:
    name: Backend (vitest + lambda build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install root dependencies (lambda build script)
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Test
        working-directory: backend
        run: npm test

      - name: Build Lambda bundles
        run: npm run build:backend

  e2e:
    name: E2E (Playwright — mobile + Square + PWA)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Backend unit tests (gate)
        run: npm run test:backend

      - name: E2E tests
        run: npm run test:e2e